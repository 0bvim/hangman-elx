name: Elixir CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    name: Build and test
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        folder: [b1, dictionary, hangman, text_client]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Elixir
      uses: erlef/setup-beam@61e01a43a562a89bfc54c7f9a378ff67b03e4a21 # v1.16.0
      with:
        elixir-version: '1.19.5' # [Required] Define the Elixir version
        otp-version: '28.0'      # [Required] Define the Erlang/OTP version
        
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: ${{matrix.folder}}/deps
        key: ${{ runner.os }}-mix-${{ matrix.folder }}-${{ hashFiles(format('{0}/mix.lock', matrix.folder)) }}
        restore-keys: ${{ runner.os }}-mix-${{ matrix.folder }}-
        
    - name: Install dependencies
      run: mix deps.get
      working-directory: ${{ matrix.folder }}

    - name: Run tests
      run: mix test
      working-directory: ${{ matrix.folder }}
